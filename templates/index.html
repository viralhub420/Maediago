<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediaGo Super App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src='//libtl.com/sdk.js' data-zone='10706593' data-sdk='show_10706593'></script>

    <style>
        :root { --primary: #00d4ff; --bg: #09090b; --card: #18181b; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 15px; padding-bottom: 50px; }
        .header { text-align: center; padding: 10px 0; border-bottom: 1px solid #27272a; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .tool-card { background: var(--card); padding: 20px 10px; border-radius: 15px; border: 1px solid #27272a; text-align: center; cursor: pointer; transition: 0.3s; }
        .tool-card:active { transform: scale(0.95); background: #27272a; }
        .tool-card i { font-size: 28px; display: block; margin-bottom: 8px; font-style: normal; }
        .tool-card span { font-size: 13px; color: #a1a1aa; font-weight: bold; }
        .section-title { font-size: 18px; margin: 25px 0 12px; color: var(--primary); font-weight: bold; border-left: 3px solid var(--primary); padding-left: 10px; }
        .content-scroll { display: flex; overflow-x: auto; gap: 12px; scrollbar-width: none; padding-bottom: 10px; }
        .content-scroll::-webkit-scrollbar { display: none; }
        .content-card { min-width: 140px; background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid #27272a; flex-shrink: 0; }
        .content-card img { width: 100%; height: 180px; object-fit: cover; }
        .btn-watch { background: var(--primary); color: #000; border: none; padding: 10px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 8px; transition: 0.2s; }
        .btn-watch:active { background: #00b8e6; }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="color:var(--primary); margin:0;">MediaGo Hub</h1>
        <p style="font-size:12px; color:#71717a;">আপনার সব সমস্যার এক সমাধান</p>
    </div>

    <div class="grid">
        <div class="tool-card" onclick="openTool('ডাউনলোডার')"><i>📥</i><span>ফ্রী ডাউনলোডার</span></div>
        <div class="tool-card" onclick="openTool('পিডিএফ')"><i>📄</i><span>PDF কনভার্টার</span></div>
        <div class="tool-card" onclick="openTool('এআই')"><i>🎨</i><span>AI ইমেজ</span></div>
        <div class="tool-card" onclick="openTool('বিজি')"><i>🖼️</i><span>BG রিমুভার</span></div>
        <div class="tool-card" onclick="openTool('এডিটর')"><i>📸</i><span>ফটো এডিটর</span></div>
        <div class="tool-card" onclick="openTool('গেম')"><i>🎮</i><span>গেম জোন</span></div>
        <div class="tool-card" onclick="openTool('কিউআর')"><i>🔍</i><span>QR স্ক্যানার</span></div>
        <div class="tool-card" onclick="openTool('নিউজ')"><i>📰</i><span>ডেইলি নিউজ</span></div>
    </div>

    <div class="section-title">🎬 লেটেস্ট মুভি ও নাটক</div>
    <div class="content-scroll">
        {% if contents %}
            {% for item in contents %}
            <div class="content-card">
                <img src="{{ item.image }}">
                <div style="padding:10px; text-align:center;">
                    <div style="font-size:12px; height:34px; overflow:hidden; font-weight: 500;">{{ item.name }}</div>
                    <button class="btn-watch" onclick="watchContent('{{ item.link }}')">Download</button>
                </div>
            </div>
            {% endfor %}
        {% else %}
            <p style="font-size:12px; padding: 20px;">কোনো পোস্ট নেই। বোট থেকে /post করুন।</p>
        {% endif %}
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function openTool(name) {
            // কিউআর স্ক্যানার আমরা ফ্রী (No Ads) রাখার প্ল্যান করেছিলাম
            if (name === 'কিউআর') {
                handleAction(name);
            } else {
                // বাকিগুলোর জন্য অ্যাড দেখাবে
                if (typeof show_10706593 === 'function') {
                    show_10706593().then(() => { handleAction(name); }).catch(() => { handleAction(name); });
                } else { handleAction(name); }
            }
        }

        function handleAction(name) {
            if(name === 'ডাউনলোডার') { 
                tg.showConfirm("ভিডিও ডাউনলোড করতে লিঙ্ক পাঠিয়ে বোট-এ ফিরে যান। আপনি কি চ্যাটে ফিরতে চান?", (ok) => {
                    if(ok) tg.close();
                }); 
            }
            else if(name === 'পিডিএফ') window.location.href = "https://www.ilovepdf.com/";
            else if(name === 'এআই') window.location.href = "https://perchance.org/ai-text-to-image-generator";
            else if(name === 'বিজি') window.location.href = "https://www.remove.bg/upload";
            else if(name === 'এডিটর') window.location.href = "https://www.photopea.com/";
            else if(name === 'গেম') window.location.href = "https://www.gamepix.com/";
            else if(name === 'কিউআর') window.location.href = "https://qrcodescan.in/";
            else if(name === 'নিউজ') window.location.href = "https://www.bbc.com/bengali";
            else tg.showAlert(name + " শীঘ্রই আসছে!");
        }

        function watchContent(link) {
            if (typeof show_10706593 === 'function') {
                show_10706593().then(() => { window.location.href = link; }).catch(() => { window.location.href = link; });
            } else { window.location.href = link; }
        }
    </script>
</body>
                                                                                         </html>
