<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediaGo Super App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src='//libtl.com/sdk.js' data-zone='10706593' data-sdk='show_10706593'></script>
    <style>
        :root { --primary: #00d4ff; --bg: #09090b; --card: #18181b; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 15px; padding-bottom: 50px; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
        .tool-card { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #27272a; text-align: center; font-size: 13px; }
        .cat-tabs { display: flex; gap: 8px; overflow-x: auto; margin-bottom: 15px; scrollbar-width: none; }
        .tab { background: #27272a; padding: 8px 15px; border-radius: 20px; font-size: 13px; cursor: pointer; border: none; color: #fff; white-space: nowrap; }
        .tab.active { background: var(--primary); color: #000; font-weight: bold; }
        .content-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .card { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid #27272a; display: none; }
        .card.show { display: block; }
        .card img { width: 100%; height: 140px; object-fit: cover; }
        .btn-dl { background: var(--primary); border: none; width: 100%; padding: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <h2 style="text-align:center; color:var(--primary); margin: 0 0 15px 0;">MediaGo Hub</h2>

    <div class="grid">
        <div class="tool-card" onclick="alert('বটে লিঙ্ক দিন')">📥 Downloader</div>
        <div class="tool-card" onclick="location.href='https://perchance.org/ai-text-to-image-generator'">🎨 AI Image</div>
    </div>

    <div class="cat-tabs">
        <button class="tab active" onclick="filter('all', this)">All</button>
        <button class="tab" onclick="filter('movie', this)">Movies</button>
        <button class="tab" onclick="filter('drama', this)">Dramas</button>
        <button class="tab" onclick="filter('series', this)">Series</button>
    </div>

    <div class="content-grid" id="list">
        {% for item in contents %}
        <div class="card show" data-cat="{{ item.category }}">
            <img src="{{ item.image }}">
            <div style="padding:8px; text-align:center; font-size:12px; height: 32px; overflow: hidden;">{{ item.name }}</div>
            <button class="btn-dl" onclick="unlock('{{ item.link }}')">Download</button>
        </div>
        {% endfor %}
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const directAdLink = "https://omg10.com/4/10651831";

        // ক্যাটাগরি ফিল্টার
        function filter(c, btn) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.card').forEach(i => {
                i.classList.toggle('show', c === 'all' || i.dataset.cat === c);
            });
        }

        // অ্যাড-লক ও আনলক প্রসেস
        function unlock(link) {
            tg.showConfirm("ভিডিওটি আনলক করতে ১০ সেকেন্ড অ্যাড দেখুন। আপনি কি প্রস্তুত?", (ok) => {
                if (ok) {
                    if (typeof show_10706593 === 'function') show_10706593().then(() => startTimer(link));
                    else startTimer(link);
                }
            });
        }

        function startTimer(link) {
            let s = 10;
            tg.MainButton.show();
            tg.MainButton.disable();
            const timer = setInterval(() => {
                tg.MainButton.setText(`Unlocking Video in ${s}s...`);
                if (s <= 0) {
                    clearInterval(timer);
                    tg.MainButton.setText("✅ Click Here to Unlock Now");
                    tg.MainButton.enable();
                    tg.MainButton.onClick(() => {
                        window.location.href = directAdLink; // প্রথমে অ্যাড লিঙ্কে পাঠাবে
                        setTimeout(() => { window.location.href = link; }, 3000); // ৩ সেকেন্ড পর ভিডিওর লিঙ্ক
                    });
                }
                s--;
            }, 1000);
        }

        // ডাউনলোডার লিঙ্ক থেকে সরাসরি আনলক অপশন
        const urlParams = new URLSearchParams(window.location.search);
        const dUrl = urlParams.get('download_url');
        if (dUrl) {
            window.onload = () => {
                const finalDownloadLink = "https://snapsave.app/search?q=" + encodeURIComponent(dUrl);
                unlock(finalDownloadLink);
            };
        }
    </script>
</body>
</html>
